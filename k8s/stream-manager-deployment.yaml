apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zodiac
  name: stream-manager
  labels:
    app: stream-manager

spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-manager
  template:
    metadata:
      labels:
        app: stream-manager
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: stream-manager
          image: "mathiskae/stream-manager:latest"
          imagePullPolicy: IfNotPresent
          env:
            - name: LOGGING_LEVEL
              value: "INFO"
            - name: MQTT_BROKER
              value: "hivezodiac"
            - name: AGENT_CALLBACK_PORT
              value: "8080"
            - name: AGENT_CALLBACK_PATH
              value: "/ingest"
            - name: MAX_TOPICS_PER_SESSION
              value: "20"
            - name: PORT
              value: "8002"
          ports:
            - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  namespace: zodiac
  name: stream-manager
spec:
  type: ClusterIP
  selector:
    app: stream-manager
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  namespace: zodiac
  name: stream-manager-external
spec:
  type: NodePort
  selector:
    app: stream-manager
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
      nodePort: 30002